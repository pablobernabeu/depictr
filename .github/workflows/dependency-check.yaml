# Scheduled check of depictr against current and development dependency versions.
# It runs daily (and on demand) so that a breaking change in any
# dependency is caught quickly. On failure it opens, or updates, a single issue
# to flag the maintainer; the companion dependency-autofix workflow can attempt
# a fix first when an Anthropic API key is configured.
name: dependency-check

on:
  schedule:
    - cron: "0 4 * * *"   # daily at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    name: ${{ matrix.config.label }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - { label: "current dependencies (R release)", r: "release", dev: false }
          - { label: "development dependencies (R devel)", r: "devel", dev: true }
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Install development versions of the key dependencies
        if: matrix.config.dev
        run: |
          pak::pkg_install(c(
            "tidyverse/ggplot2",
            "thomasp85/patchwork",
            "r-lib/scales",
            "r-lib/rlang",
            "tidyverse/stringr"
          ))
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: false
          error-on: '"warning"'

      - name: Open or update an issue on failure
        if: failure()
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONFIG: ${{ matrix.config.label }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          filename: .github/issue-templates/dependency-issue.md
          update_existing: true
