url: https://pablobernabeu.github.io/depictr

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#005b96"
  includes:
    in_header: |
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

development:
  mode: auto

authors:
  Pablo Bernabeu:
    href: https://pablobernabeu.github.io/

footer:
  structure:
    left: [developed_by]
    right: [legal, built_with]
  components:
    developed_by: >
      Developed by [Pablo Bernabeu](https://pablobernabeu.github.io). Open,
      reproducible research software in R and Python.
    legal: "Released under the [MIT licence](LICENSE.html)."

home:
  sidebar:
    # Slim the right sidebar: the citation points at the About page (not
    # pkgdown's authors.html#citation), the licence is one British-spelled link
    # (the default "MIT + file LICENSE" line also links a stub page the deploy
    # prunes), and Community shows only the contributing guide.
    structure: [links, license, community, citation, authors, dev]
    components:
      license:
        title: Licence
        text: >
          [MIT licence](LICENSE.html)
      community:
        title: Community
        text: >
          [Contributing guide](CONTRIBUTING.html)
      citation:
        title: Citation
        text: |
          [How to cite depictr](articles/about.html)

          [![DOI](https://zenodo.org/badge/DOI/10.5281/zenodo.21266308.svg)](https://doi.org/10.5281/zenodo.21266308)

navbar:
  structure:
    left: [intro, reference, articles, news, about]
    right: [search, github, lightswitch]
  components:
    articles:
      text: Articles
      menu:
      - text: Exploring data
        href: articles/exploring-data.html
      - text: Visualising model estimates
        href: articles/model-estimates.html
      - text: Diagnostics, classification and uncertainty
        href: articles/diagnostics-and-uncertainty.html
      - text: Multivariate analysis and survival
        href: articles/multivariate-and-survival.html
      - text: Time series
        href: articles/time-series.html
    about:
      text: About
      href: articles/about.html

figures:
  dpi: 96
  fig.width: 7
  fig.height: 4.5

reference:
- title: Exploring data
  desc: >
    A first look at distributions, relationships, data quality and summaries.
  contents:
  - explore_distribution
  - ecdf_plot
  - explore_categorical
  - explore_bivariate
  - explore_pairs
  - correlation_heatmap
  - missingness_map
  - outlier_plot
  - raincloud_plot
  - ridgeline_plot
  - group_comparison_plot
  - estimation_plot
  - dumbbell_plot
  - scatter_trend
  - summary_table

- title: Multivariate, clustering and survival
  desc: >
    Principal components, k-means and hierarchical clustering with cluster
    diagnostics, and Kaplan-Meier survival curves.
  contents:
  - pca_plot
  - scree_plot
  - cluster_plot
  - silhouette_plot
  - k_diagnostic
  - dendrogram_plot
  - survival_plot

- title: Time series
  desc: >
    Series over time, autocorrelation, decomposition, seasonal subseries and
    forecasting.
  contents:
  - timeseries_plot
  - acf_plot
  - decompose_plot
  - seasonal_plot
  - ts_forecast

- title: Model estimates and inference
  desc: >
    Forest plots, model comparison, predicted values, interactions, random
    effects and goodness-of-fit, built on a shared tidy estimate table.
  contents:
  - tidy_estimates
  - coefficient_plot
  - compare_models
  - frequentist_bayesian_plot
  - effects_plot
  - interaction_plot
  - random_effects_plot
  - optimizer_fixef_plot
  - model_fit_table

- title: Diagnostics and classification
  desc: >
    Residual diagnostics, influence, and the standard classification curves
    and tables.
  contents:
  - residual_diagnostics_plot
  - binned_residual_plot
  - influence_plot
  - qq_plot
  - vif_plot
  - roc_curve_plot
  - pr_curve_plot
  - gain_plot
  - lift_plot
  - calibration_plot
  - threshold_plot
  - confusion_matrix_plot

- title: Uncertainty and power
  desc: Posterior summaries and power analysis curves.
  contents:
  - posterior_plot
  - power_curve_plot

- title: Theming and reporting
  desc: >
    A shared theme and colourblind-aware palette, label helpers, plot
    composition and saving, and a one-figure model report.
  contents:
  - theme_depictr
  - depictr_palette
  - scale_colour_depictr
  - palette_preview
  - format_terms
  - model_report
  - arrange_plots
  - save_plot
  - depictr_options

- title: Data
  desc: Reproducibly simulated datasets used throughout the documentation.
  contents:
  - lexical_decision
  - wellbeing_survey
  - crop_yield
  - clinical_trial
  - monthly_sales

articles:
- title: Articles
  navbar: ~
  contents:
  - depictr
  - exploring-data
  - model-estimates
  - diagnostics-and-uncertainty
  - multivariate-and-survival
  - time-series
- title: internal
  contents:
  - articles/about
