url: https://pablobernabeu.github.io/depictr

template:
  bootstrap: 5
  light-switch: true
  bslib:
    primary: "#005b96"

development:
  mode: auto

authors:
  Pablo Bernabeu:
    href: https://github.com/pablobernabeu

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [search, github, lightswitch]

figures:
  dpi: 96
  fig.width: 7
  fig.height: 4.5

reference:
- title: Exploring data
  desc: >
    A first look at distributions, relationships, data quality and summaries.
  contents:
  - explore_distribution
  - explore_categorical
  - explore_bivariate
  - explore_pairs
  - correlation_heatmap
  - missingness_map
  - outlier_plot
  - raincloud_plot
  - group_comparison_plot
  - scatter_trend
  - summary_table

- title: Multivariate, clustering and survival
  desc: >
    Principal components, k-means and hierarchical clustering, and
    Kaplan-Meier survival curves.
  contents:
  - pca_plot
  - scree_plot
  - cluster_plot
  - dendrogram_plot
  - survival_plot

- title: Time series
  desc: Series over time, autocorrelation and decomposition.
  contents:
  - timeseries_plot
  - acf_plot
  - decompose_plot

- title: Model estimates and inference
  desc: >
    Forest plots, model comparison, predicted values, interactions, random
    effects and goodness-of-fit, built on a shared tidy estimate table.
  contents:
  - tidy_estimates
  - coefficient_plot
  - compare_models
  - frequentist_bayesian_plot
  - effects_plot
  - interaction_plot
  - random_effects_plot
  - optimizer_fixef_plot
  - model_fit_table

- title: Diagnostics and classification
  desc: >
    Residual diagnostics, influence, and the standard classification curves
    and tables.
  contents:
  - residual_diagnostics_plot
  - influence_plot
  - qq_plot
  - vif_plot
  - roc_curve_plot
  - pr_curve_plot
  - gain_plot
  - lift_plot
  - calibration_plot
  - confusion_matrix_plot

- title: Uncertainty and power
  desc: Posterior summaries and power analysis curves.
  contents:
  - posterior_plot
  - power_curve_plot

- title: Theming and reporting
  desc: >
    A shared theme and colourblind-aware palette, label helpers, plot
    composition and saving, and a one-figure model report.
  contents:
  - theme_depictr
  - depictr_palette
  - scale_colour_depictr
  - palette_preview
  - format_terms
  - model_report
  - arrange_plots
  - save_plot

- title: Data
  desc: Reproducibly simulated datasets used throughout the documentation.
  contents:
  - lexical_decision
  - wellbeing_survey
  - crop_yield

articles:
- title: Articles
  navbar: ~
  contents:
  - depictr
  - exploring-data
  - model-estimates
  - diagnostics-and-uncertainty
  - multivariate-and-survival
  - time-series
